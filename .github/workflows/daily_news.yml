name: Daily Org News to KakaoWork

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  run-news-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          KAKAOWORK_WEBHOOK_URL: ${{ secrets.KAKAOWORK_WEBHOOK_URL }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_GID: ${{ secrets.SHEET_GID }}
          LOOKBACK_DAYS: ${{ secrets.LOOKBACK_DAYS }}
          MAX_ARTICLES_PER_ORG: ${{ secrets.MAX_ARTICLES_PER_ORG }}
          MAX_TOTAL_ARTICLES: ${{ secrets.MAX_TOTAL_ARTICLES }}
        run: python news_bot.py
